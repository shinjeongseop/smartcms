name: FTP Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate runtime config
        env:
          SMARTCMS_DB_HOST: ${{ secrets.SMARTCMS_DB_HOST }}
          SMARTCMS_DB_NAME: ${{ secrets.SMARTCMS_DB_NAME }}
          SMARTCMS_DB_USER: ${{ secrets.SMARTCMS_DB_USER }}
          SMARTCMS_DB_PASS: ${{ secrets.SMARTCMS_DB_PASS }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          from textwrap import dedent

          host = os.environ.get("SMARTCMS_DB_HOST", "").strip() or "localhost"
          name = os.environ.get("SMARTCMS_DB_NAME", "").strip()
          user = os.environ.get("SMARTCMS_DB_USER", "").strip()
          password = os.environ.get("SMARTCMS_DB_PASS", "")

          if not name or not user or not password:
              raise SystemExit(0)

          config = dedent(f"""\
          <?php
          return [
              'table_prefix' => 'sc_',
              'db' => [
                  'host' => {host!r},
                  'name' => {name!r},
                  'user' => {user!r},
                  'pass' => {password!r},
                  'charset' => 'utf8mb4',
              ],
          ];
          """)
          Path("config.local.php").write_text(config, encoding="utf-8")
          PY

      - name: Generate runtime webhook config
        env:
          SMARTCMS_WEBHOOK_TOKEN: ${{ secrets.SMARTCMS_WEBHOOK_TOKEN }}
          SMARTCMS_WEBHOOK_BOARD_KEY: ${{ secrets.SMARTCMS_WEBHOOK_BOARD_KEY }}
          SMARTCMS_WEBHOOK_AUTHOR_NAME: ${{ secrets.SMARTCMS_WEBHOOK_AUTHOR_NAME }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          from textwrap import dedent

          token = os.environ.get("SMARTCMS_WEBHOOK_TOKEN", "").strip()
          board_key = os.environ.get("SMARTCMS_WEBHOOK_BOARD_KEY", "").strip() or "releases"
          author_name = os.environ.get("SMARTCMS_WEBHOOK_AUTHOR_NAME", "").strip() or "GitHub Actions"

          if not token:
              raise SystemExit(0)

          config = dedent(f"""\
          <?php
          return [
              'github_commit_log' => [
                  'token' => {token!r},
                  'board_key' => {board_key!r},
                  'author_name' => {author_name!r},
              ],
          ];
          """)
          Path("webhook.local.php").write_text(config, encoding="utf-8")
          PY

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./
          server-dir: /html/
          dangerous-clean-slate: false
          exclude: |
            **/.git/**
            **/.github/**
            **/docs/**
            **/node_modules/**
            install.lock
            README.md

      - name: Publish commit log to SmartCMS board
        continue-on-error: true
        env:
          SMARTCMS_WEBHOOK_URL: ${{ secrets.SMARTCMS_WEBHOOK_URL }}
          SMARTCMS_WEBHOOK_TOKEN: ${{ secrets.SMARTCMS_WEBHOOK_TOKEN }}
          SMARTCMS_WEBHOOK_BOARD_KEY: ${{ secrets.SMARTCMS_WEBHOOK_BOARD_KEY }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess

          webhook_url = os.environ.get("SMARTCMS_WEBHOOK_URL", "").strip()
          webhook_token = os.environ.get("SMARTCMS_WEBHOOK_TOKEN", "").strip()
          board_key = os.environ.get("SMARTCMS_WEBHOOK_BOARD_KEY", "").strip()
          if not webhook_url or not webhook_token:
              raise SystemExit(0)

          before = os.environ["GITHUB_EVENT_BEFORE"]
          after = os.environ["GITHUB_SHA"]
          repo = os.environ["GITHUB_REPOSITORY"]
          branch = os.environ["GITHUB_REF_NAME"]
          server_url = os.environ["GITHUB_SERVER_URL"].rstrip("/")
          is_initial_push = before and set(before) == {"0"}
          compare_url = (
              f"{server_url}/{repo}/commit/{after}"
              if is_initial_push
              else f"{server_url}/{repo}/compare/{before}...{after}"
          )
          board_key = board_key or "releases"

          log_format = "%H%x1f%s"
          git_range = after if is_initial_push else f"{before}..{after}"
          output = subprocess.check_output(
              ["git", "log", git_range, f"--format={log_format}", "--date=iso-strict"],
              text=True,
          ).strip()

          commits = []
          if output:
              for line in output.splitlines():
                  sha, message = line.split("\x1f")
                  files_output = subprocess.check_output(
                      ["git", "show", "--pretty=format:", "--name-only", sha],
                      text=True,
                  ).strip()
                  files = [item.strip() for item in files_output.splitlines() if item.strip()]
                  commits.append(
                      {
                          "sha": sha,
                          "message": message,
                          "files": files,
                      }
                  )

          if commits:
              first_message = commits[0]["message"].strip() or "커밋 로그"
              if len(commits) == 1:
                  title = first_message
              else:
                  title = f"{first_message} 외 {len(commits) - 1}건 변경"
          else:
              title = "커밋 로그"
          title = title[:255]

          content_lines = []
          content_lines.append("커밋 상세")

          for index, commit in enumerate(commits, start=1):
              message = commit["message"].strip() or "메시지 없음"
              files = commit.get("files", [])
              lines = [f"{index}. 해결 내용: {message}"]
              if files:
                  lines.append("   - 수정 파일: " + ", ".join(files))
              else:
                  lines.append("   - 수정 파일: 없음")
              content_lines.extend(lines)
              if index != len(commits):
                  content_lines.append("")

          payload = {
              "board_key": board_key,
              "repository": repo,
              "branch": branch,
              "before": before,
              "after": after,
              "compare_url": compare_url,
              "author_name": "GitHub Actions",
              "title": title,
              "content": "\n".join(content_lines),
              "commits": commits,
          }

          payload_path = "commit-log-payload.json"
          with open(payload_path, "w", encoding="utf-8") as handle:
              json.dump(payload, handle, ensure_ascii=False, indent=2)

          completed = subprocess.run(
              [
                  "curl",
                  "-sS",
                  "-X",
                  "POST",
                  "-H",
                  "Content-Type: application/json",
                  "-H",
                  f"X-SmartCMS-Webhook-Token: {webhook_token}",
                  "--data",
                  f"@{payload_path}",
                  webhook_url,
              ],
              capture_output=True,
              text=True,
          )
          if completed.stdout.strip():
              print(completed.stdout.strip())
          if completed.returncode != 0:
              if completed.stderr.strip():
                  print(completed.stderr.strip())
              raise subprocess.CalledProcessError(
                  completed.returncode,
                  completed.args,
                  output=completed.stdout,
                  stderr=completed.stderr,
              )
          PY
